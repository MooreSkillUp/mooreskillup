name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/prod.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements/prod.txt
      - name: Run Django checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_DEBUG: "True"
          DB_HOST: localhost
          DB_PORT: "5432"
        run: python backend/manage.py check

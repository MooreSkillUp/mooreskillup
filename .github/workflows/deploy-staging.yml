name: Deploy Staging

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "src/**"
      - "Dockerfile"
      - "Dockerfile.frontend"
      - "docker-compose.prod.yml"
      - "infrastructure/terraform/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  build-test-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/prod.txt
      - uses: hashicorp/setup-terraform@v3
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: pip install -r backend/requirements/prod.txt
      - run: python backend/manage.py check
      - working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive
      - working-directory: infrastructure/terraform
        run: terraform init -backend=false
      - working-directory: infrastructure/terraform
        run: terraform validate
      - working-directory: infrastructure/terraform
        run: terraform plan -var-file=environments/staging/terraform.tfvars.example -input=false

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-plan
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        working-directory: infrastructure/terraform
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}"
          -backend-config="key=staging.terraform.tfstate"
      - name: Terraform apply foundation
        working-directory: infrastructure/terraform
        run: >
          terraform apply -auto-approve
          -var-file=environments/staging/terraform.tfvars.example
          -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}"
          -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}"
          -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}"
      - name: Read ACR details
        working-directory: infrastructure/terraform
        run: |
          ACR_LOGIN_SERVER=$(terraform output -raw acr_login_server)
          ACR_USERNAME=$(terraform output -raw acr_admin_username)
          ACR_PASSWORD=$(terraform output -raw acr_admin_password)
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV
      - name: Log in to ACR
        run: echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin
      - uses: docker/setup-buildx-action@v3
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/api:staging-latest
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/web:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/web:staging-latest
      - name: Terraform apply apps
        working-directory: infrastructure/terraform
        run: >
          terraform apply -auto-approve
          -var-file=environments/staging/terraform.tfvars.example
          -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}"
          -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}"
          -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}"
          -var="api_image=${{ env.ACR_LOGIN_SERVER }}/api:${{ github.sha }}"
          -var="web_image=${{ env.ACR_LOGIN_SERVER }}/web:${{ github.sha }}"
          -var="next_public_api_url=${{ secrets.STAGING_API_URL }}"
          -var="frontend_url=${{ secrets.STAGING_WEB_URL }}"
      - name: Read staging URLs
        working-directory: infrastructure/terraform
        run: |
          echo "STAGING_API_URL=$(terraform output -raw api_url)" >> $GITHUB_ENV
          echo "STAGING_WEB_URL=$(terraform output -raw web_url)" >> $GITHUB_ENV
      - name: Smoke test staging
        run: |
          curl -fsS "$STAGING_WEB_URL" >/dev/null
          curl -fsS "$STAGING_API_URL/api/auth/health/" >/dev/null
